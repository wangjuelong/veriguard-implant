name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            os_name: linux
            arch: x86_64
            ext: ""
          # Linux arm64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04
            os_name: linux
            arch: arm64
            ext: ""
          # macOS x86_64
          - target: x86_64-apple-darwin
            runner: macos-13
            os_name: macos
            arch: x86_64
            ext: ""
          # macOS arm64
          - target: aarch64-apple-darwin
            runner: macos-14
            os_name: macos
            arch: arm64
            ext: ""
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            os_name: windows
            arch: x86_64
            ext: ".exe"
          # Windows arm64
          - target: aarch64-pc-windows-msvc
            runner: windows-2022
            os_name: windows
            arch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cargo-zigbuild enables cross-compilation for musl targets
      - name: Install cargo-zigbuild (Linux cross)
        if: matrix.os_name == 'linux'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --locked

      - name: Build (Linux via zigbuild)
        if: matrix.os_name == 'linux'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (non-Linux)
        if: matrix.os_name != 'linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/veriguard-implant${{ matrix.ext }}"
          DEST="veriguard-implant-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          cp "$BIN" "$DEST"
          echo "ARTIFACT=$DEST" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum veriguard-implant-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/veriguard-implant-*
            artifacts/SHA256SUMS
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test (native)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-22.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check
